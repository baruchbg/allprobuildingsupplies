<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Products — All Pro Building Supplies LLC</title>
<meta name="description" content="Browse All Pro Building Supplies product catalog — PVC pipe, DWV fittings, bends, tees, wyes, and more. Call 732-829-1940 for pricing."/>
  <link rel="stylesheet" href="../assets/style.css"/>
</head>
<body>

<div id="cursor"></div><div id="cursor-ring"></div>

<div id="global-header"></div>

<header class="pg-hdr" style="margin-top:60px;">
  <div class="pg-hdr-inner">
    <div class="lbl" data-r>Master Catalog</div>
    <h1 class="pg-title" data-r>Our <span>Products.</span></h1>
    <p class="pg-sub" data-r>Log in to view your approved pricing and place orders directly. Don't see an item? <a href="contact.html" style="color:var(--gold);">Contact us</a> for special sourcing.</p>
  </div>
</header>

<section class="sec" style="background:var(--ink2); border-top:1px solid rgba(200,152,31,.1)">
  <div class="sec-inner">
    
    <div class="mobile-filter-wrap">
      <select class="mobile-filter-sel" id="mob-filter" onchange="filterProducts(this.value)">
        <option value="ALL">All Categories</option>
        <option value="PIPE">Pipe</option>
        <option value="PVC">PVC Fittings</option>
      </select>
    </div>

    <div class="filter-bar" id="desk-filter" data-r>
      <button class="filter-btn on" onclick="filterProducts('ALL', this)">All Categories</button>
      <button class="filter-btn" onclick="filterProducts('PIPE', this)">Pipe</button>
      <button class="filter-btn" onclick="filterProducts('PVC', this)">PVC Fittings</button>
    </div>

    <div id="products-container" data-r>
      <p style="color:var(--silver);">Loading inventory...</p>
    </div>

  </div>
</section>

<div id="global-footer"></div>

  <script src="../assets/main.js"></script>
<script>
const WORKER_URL = 'https://allpro-github-proxy.baruch-6d5.workers.dev';
let allProducts = [];
let isLoggedIn = false;

function parseCSV(str) {
  var lines = [], curLine = [], curStr = '', inQ = false;
  for(var i=0; i<str.length; i++) {
    var c = str[i];
    if(c === '"') {
      if(inQ && str[i+1] === '"') { curStr += '"'; i++; } else { inQ = !inQ; }
    } else if(c === ',' && !inQ) {
      curLine.push(curStr); curStr = '';
    } else if((c === '\n' || c === '\r') && !inQ) {
      if(c === '\r' && str[i+1] === '\n') i++;
      curLine.push(curStr); lines.push(curLine); curLine = []; curStr = '';
    } else { curStr += c; }
  }
  if(curStr !== '' || curLine.length > 0) { curLine.push(curStr); lines.push(curLine); }
  return lines;
}

async function loadProducts() {
  try {
    const userSess = sessionStorage.getItem('apbs_user');
    if(userSess) {
      const u = JSON.parse(userSess);
      if(u.status === 'approved') isLoggedIn = true;
    }

    const r = await fetch(WORKER_URL + '/github/products.csv');
    const d = await r.json();
    const csv = decodeURIComponent(escape(atob(d.content)));
    const rows = parseCSV(csv);
    
    for(let i=1; i<rows.length; i++) {
      if(!rows[i][0]) continue;
      allProducts.push({
        code: rows[i][0].trim(),
        description: rows[i][1].trim(),
        size: rows[i][2].trim(),
        pack: rows[i][3].trim(),
        qty: parseInt(rows[i][4]) || 0,
        price: parseFloat(rows[i][5]) || 0,
        image: rows[i][6] ? rows[i][6].trim() : ''
      });
    }
    renderProducts(allProducts);
  } catch(e) {
    document.getElementById('products-container').innerHTML = '<p style="color:#ff6b6b;">Error loading products. Please refresh.</p>';
  }
}

function renderProducts(list) {
  const container = document.getElementById('products-container');
  container.innerHTML = '';
  
  list.forEach(p => {
    let priceHTML = isLoggedIn 
      ? `<div class="prod-price">$${p.price.toFixed(2)} <span>/ ea</span></div>` 
      : `<div class="prod-price" style="font-size:14px;color:var(--gold);">Log in for pricing</div>`;
      
    let actionHTML = isLoggedIn
      ? `<button class="prod-action" onclick="addToCart(this)" data-code="${p.code}" data-size="${p.size}" data-desc="${p.description}" data-pcs="${p.pack.replace(/[^0-9]/g, '')||1}" data-price="${p.price}" data-qty="${p.qty}">+ Add to Cart</button>`
      : `<button class="prod-action" onclick="window.location.href='login.html'">Log In</button>`;

    let imgHTML = p.image ? `<img src="../${p.image}" class="prod-img" onerror="this.style.display='none'" />` : `<div class="prod-img" style="display:flex;align-items:center;justify-content:center;color:#ccc;">No Image</div>`;

    container.innerHTML += `
      <div class="prod-card">
        ${imgHTML}
        <div class="prod-code">${p.code}</div>
        <div class="prod-name">${p.description}</div>
        <div class="prod-details">
          <div class="prod-size">Size: ${p.size}<br><span style="font-size:11px;">Pack: ${p.pack}</span></div>
          ${priceHTML}
        </div>
        ${actionHTML}
      </div>
    `;
  });
}

function filterProducts(cat, btn) {
  if(btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
  }
  document.getElementById('mob-filter').value = cat;
  
  if(cat === 'ALL') { renderProducts(allProducts); return; }
  const filtered = allProducts.filter(p => p.code.startsWith(cat));
  renderProducts(filtered);
}

function getCart(){ return JSON.parse(localStorage.getItem('apbs_cart')||'[]'); }
function saveCart(c){ localStorage.setItem('apbs_cart', JSON.stringify(c)); }

function addToCart(btn){
  var code  = btn.dataset.code;
  var size  = btn.dataset.size;
  var desc  = btn.dataset.desc;
  var pcs   = parseInt(btn.dataset.pcs)||1;
  var price = parseFloat(btn.dataset.price)||0;
  var maxQty= parseInt(btn.dataset.qty)||0;
  var sess  = null;
  try{ sess = JSON.parse(sessionStorage.getItem('apbs_user')); }catch(e){}
  
  if(!isLoggedIn) {
     alert("You must be logged into an approved trade account to add items to your cart.");
     window.location.href = "login.html";
     return;
  }
  
  var cart  = getCart();
  var existing = cart.find(function(i){ return i.code===code && i.size===size; });
  if(existing){
    existing.qty = Math.min(existing.qty+1, maxQty);
  } else {
    var defaultUnit = (sess && sess.canOrderPieces===false) ? 'carton' : 'piece';
    var defaultQty  = defaultUnit==='carton' ? pcs : 1;
    cart.push({code:code, size:size, description:desc, pcsPerCtn:pcs, unitPrice:price, qty:defaultQty, unit:defaultUnit, maxQty:maxQty});
  }
  saveCart(cart);
  
  btn.innerHTML = "✓ Added";
  btn.style.background = "var(--gold)";
  btn.style.color = "var(--ink)";
  setTimeout(function(){
    btn.innerHTML = "+ Add to Cart";
    btn.style.background = "transparent";
    btn.style.color = "var(--gold)";
  }, 1500);

  var total = cart.reduce(function(s,i){ return s+i.qty; }, 0);
  var el = document.getElementById('nav-cart-count');
  if(el) el.textContent = total > 0 ? total : '';
}

document.addEventListener('DOMContentLoaded', loadProducts);
</script>
</body>
</html>
