<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Login — All Pro Building Supplies LLC (TEST)</title>
<link rel="stylesheet" href="assets/style.css"/>
<script src="assets/config.js"></script>
</head>
<body>
<div data-include="partials/cursor.html"></div>
<div data-include="partials/topbar.html"></div>
<div data-include="partials/nav.html"></div>
<div data-include="partials/mobile-menu.html"></div>

<div class="auth-wrapper">
  <div class="auth-box">

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" data-tab="login">Login</button>
      <button class="auth-tab" id="tab-change" data-tab="change">Change Password</button>
    </div>

    <div id="form-login" class="auth-form active">
      <div id="login-msg" class="auth-msg"></div>
      <div class="form-group">
        <label class="form-lbl">Email Address</label>
        <input type="email" id="log-email" class="form-inp" placeholder="contractor@email.com"/>
      </div>
      <div class="form-group">
        <label class="form-lbl">Password</label>
        <input type="password" id="log-pass" class="form-inp" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;"/>
      </div>
      <button class="btn-auth" id="btn-login">Sign In</button>
      <div style="text-align:center;margin-top:20px;font-size:13px;color:var(--silver);">
        Don't have a trade account? <a href="register.html" style="color:var(--gold);">Request Access</a>
      </div>
    </div>

    <div id="form-change" class="auth-form">
      <div id="change-msg" class="auth-msg"></div>
      <p style="font-size:13px;color:var(--silver);margin-bottom:20px;line-height:1.5;">Enter your current login credentials and choose a new password.</p>
      <div class="form-group"><label class="form-lbl">Email Address</label><input type="email" id="chg-email" class="form-inp"/></div>
      <div class="form-group"><label class="form-lbl">Current Password</label><input type="password" id="chg-old-pass" class="form-inp"/></div>
      <div class="form-group"><label class="form-lbl">New Password</label><input type="password" id="chg-new-pass" class="form-inp"/></div>
      <button class="btn-auth" id="btn-change">Update Password</button>
    </div>

  </div>
</div>

<div data-include="partials/footer.html"></div>

<script type="module" src="assets/include.mjs"></script>
<script type="module" src="pages/login.mjs"></script>
</body>
</html>
