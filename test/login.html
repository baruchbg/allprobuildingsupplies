<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Dealer Login — All Pro Building Supplies</title>
<link rel="stylesheet" href="assets/style.css"/>

</head>
<body>
<div id="cursor"></div><div id="cursor-ring"></div>

<div id="global-header"></div>

<div class="auth-wrapper">
  <div class="auth-box">
    
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuth('login')" id="tab-login">Login</button>
      <button class="auth-tab" onclick="switchAuth('change')" id="tab-change">Change Password</button>
    </div>

    <div id="form-login" class="auth-form active">
      <div id="login-msg" class="auth-msg"></div>
      <div class="form-group">
        <label class="form-lbl">Email Address</label>
        <input type="email" id="log-email" class="form-inp" placeholder="contractor@email.com">
      </div>
      <div class="form-group">
        <label class="form-lbl">Password</label>
        <input type="password" id="log-pass" class="form-inp" placeholder="••••••••">
      </div>
      <button class="btn-auth" id="btn-login" onclick="processLogin()">Login →</button>
      
      <div style="text-align:center;margin-top:16px;">
        <a href="register.html" style="font-size:12px;color:var(--silver);text-decoration:none;">Don't have an account? <span style="color:var(--gold);">Request Pricing Access</span></a>
      </div>
    </div>

    <div id="form-change" class="auth-form">
      <div id="change-msg" class="auth-msg"></div>
      <div class="form-group">
        <label class="form-lbl">Email Address</label>
        <input type="email" id="chg-email" class="form-inp" placeholder="contractor@email.com">
      </div>
      <div class="form-group">
        <label class="form-lbl">Current Password</label>
        <input type="password" id="chg-old-pass" class="form-inp" placeholder="••••••••">
      </div>
      <div class="form-group">
        <label class="form-lbl">New Password</label>
        <input type="password" id="chg-new-pass" class="form-inp" placeholder="••••••••">
      </div>
      <button class="btn-auth" onclick="processChange(this)">Update Password</button>
    </div>

  </div>
</div>

<div id="global-footer"></div>

<script src="assets/main.js"></script>
<script>
// Function to switch between Login and Change Password tabs
function switchAuth(type) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
  document.getElementById('tab-' + type).classList.add('active');
  document.getElementById('form-' + type).classList.add('active');
  document.getElementById(type === 'login' ? 'login-msg' : 'change-msg').style.display = 'none';
}

// Helper to show messages
function showMsg(type, text, isErr) {
  const el = document.getElementById(type === 'login' ? 'login-msg' : 'change-msg');
  el.textContent = text;
  el.className = 'auth-msg ' + (isErr ? 'msg-err' : 'msg-ok');
  el.style.display = 'block';
}

// ---------------------------------------------------------
// NEW SECURE API LOGIN
// ---------------------------------------------------------
async function processLogin() {
  const btn = document.getElementById('btn-login');
  const email = document.getElementById('log-email').value.trim();
  const password = document.getElementById('log-pass').value;

  if (!email || !password) {
    showMsg('login', 'Please enter both email and password.', true);
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Authenticating...';

  try {
    // 1. Hash the password before sending it (matches old logic)
    const encoder = new TextEncoder();
    const data = encoder.encode(password);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    const hashedPassword = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

    // 2. Send to Cloudflare D1 API
    const response = await fetch(window.APBS_API_BASE + '/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, password: hashedPassword })
    });

    const result = await response.json();

    // 3. Handle the response
    if (!response.ok) {
      showMsg('login', result.error || 'Login failed.', true);
      btn.disabled = false;
      btn.textContent = 'Login →';
      return;
    }

    // 4. Success! Save user session and redirect
    sessionStorage.setItem('apbs_user', JSON.stringify(result.user));
    if (result.token) sessionStorage.setItem('apbs_token', result.token);
    
    showMsg('login', 'Success! Redirecting...', false);
    setTimeout(() => { window.location.href = 'index.html'; }, 800);

  } catch (err) {
    console.error(err);
    showMsg('login', 'Network error. Please try again.', true);
    btn.disabled = false;
    btn.textContent = 'Login →';
  }
}

// Allow pressing "Enter" to submit
document.getElementById('log-pass').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') processLogin();
});

// Change password placeholder (Will be implemented later)
function processChange(btn) {
    showMsg('change', 'Password change via API is under construction.', true);
}
</script>
</body>
</html>
