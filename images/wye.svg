<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="gw1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c0c0c0"/><stop offset="40%" stop-color="#ffffff"/><stop offset="100%" stop-color="#a0a0a0"/>
    </linearGradient>
    <linearGradient id="gw2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d0d0d0"/><stop offset="50%" stop-color="#ffffff"/><stop offset="100%" stop-color="#a8a8a8"/>
    </linearGradient>
  </defs>
  <!-- main horizontal run -->
  <rect x="15" y="84" width="170" height="48" rx="3" fill="url(#gw1)"/>
  <rect x="15" y="92" width="170" height="12" fill="rgba(255,255,255,0.4)"/>
  <!-- 45-deg branch -->
  <path d="M90,36 L114,36 L155,84 L131,84 Z" fill="url(#gw2)"/>
  <path d="M96,36 L105,36 L143,84 L134,84 Z" fill="rgba(255,255,255,0.35)"/>
  <!-- branch body blends into run -->
  <path d="M131,84 L155,84 L155,108 L131,108 Z" fill="url(#gw1)"/>
  <!-- left end cap -->
  <ellipse cx="15" cy="108" rx="8" ry="24" fill="#c0c0c0"/>
  <ellipse cx="15" cy="108" rx="5" ry="16" fill="#2a2a2a"/>
  <!-- right end cap -->
  <ellipse cx="185" cy="108" rx="8" ry="24" fill="#c0c0c0"/>
  <ellipse cx="185" cy="108" rx="5" ry="16" fill="#2a2a2a"/>
  <!-- branch end cap -->
  <ellipse cx="102" cy="36" rx="14" ry="5" fill="#c0c0c0"/>
  <ellipse cx="102" cy="36" rx="9" ry="3" fill="#2a2a2a"/>
  <text x="100" y="170" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#C8981F">WYE</text>
  <text x="100" y="184" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">All Hub</text>
</svg>
