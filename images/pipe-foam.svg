<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="foamBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="30%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#d0d0d0"/>
      <stop offset="100%" stop-color="#a0a0a0"/>
    </linearGradient>
    <linearGradient id="foamCore" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f5f0"/>
      <stop offset="50%" stop-color="#ececec"/>
      <stop offset="100%" stop-color="#cccccc"/>
    </linearGradient>
    <linearGradient id="endCap" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b0b0b0"/>
      <stop offset="50%" stop-color="#e0e0e0"/>
      <stop offset="100%" stop-color="#909090"/>
    </linearGradient>
  </defs>
  <!-- outer pipe -->
  <rect x="20" y="68" width="160" height="64" rx="2" fill="url(#foamBody)"/>
  <!-- foam core layer visible at cut end -->
  <rect x="20" y="76" width="160" height="48" rx="1" fill="url(#foamCore)"/>
  <!-- inner pipe wall -->
  <rect x="20" y="84" width="160" height="32" rx="1" fill="url(#foamBody)"/>
  <!-- highlight -->
  <rect x="20" y="86" width="160" height="8" fill="rgba(255,255,255,0.45)"/>
  <!-- left end -->
  <ellipse cx="20" cy="100" rx="9" ry="32" fill="url(#endCap)"/>
  <!-- foam ring at left end -->
  <ellipse cx="20" cy="100" rx="6" ry="24" fill="#e8e8e0"/>
  <!-- inner hole left -->
  <ellipse cx="20" cy="100" rx="4" ry="16" fill="#333"/>
  <!-- right end -->
  <ellipse cx="180" cy="100" rx="9" ry="32" fill="url(#endCap)"/>
  <ellipse cx="180" cy="100" rx="6" ry="24" fill="#e8e8e0"/>
  <ellipse cx="180" cy="100" rx="4" ry="16" fill="#333"/>
  <text x="100" y="170" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#C8981F">DWV FOAM CORE</text>
  <text x="100" y="185" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">ASTM F891</text>
</svg>
