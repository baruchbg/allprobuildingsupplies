<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b8b8b8"/>
      <stop offset="30%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#e0e0e0"/>
      <stop offset="100%" stop-color="#a0a0a0"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b8b8b8"/>
      <stop offset="30%" stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#e0e0e0"/>
      <stop offset="100%" stop-color="#a0a0a0"/>
    </linearGradient>
    <radialGradient id="gCorner" cx="100%" cy="100%" r="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#d8d8d8"/>
      <stop offset="100%" stop-color="#a0a0a0"/>
    </radialGradient>
  </defs>
  <!-- vertical arm -->
  <rect x="72" y="20" width="56" height="90" rx="2" fill="url(#g1)"/>
  <rect x="80" y="20" width="12" height="90" fill="rgba(255,255,255,0.4)"/>
  <!-- horizontal arm -->
  <rect x="90" y="90" width="90" height="56" rx="2" fill="url(#g2)"/>
  <rect x="90" y="98" width="90" height="12" fill="rgba(255,255,255,0.4)"/>
  <!-- corner fill -->
  <rect x="72" y="90" width="56" height="56" fill="url(#gCorner)"/>
  <!-- corner curve cutout -->
  <path d="M72,90 Q72,146 128,146 L128,146 Q90,146 90,90 Z" fill="#1a1a1a" opacity="0.15"/>
  <!-- top end cap -->
  <ellipse cx="100" cy="20" rx="28" ry="8" fill="#c0c0c0"/>
  <ellipse cx="100" cy="20" rx="18" ry="5" fill="#333"/>
  <!-- right end cap -->
  <ellipse cx="180" cy="118" rx="8" ry="28" fill="#c0c0c0"/>
  <ellipse cx="180" cy="118" rx="5" ry="18" fill="#333"/>
  <text x="100" y="175" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#C8981F">1/4 BEND</text>
  <text x="100" y="190" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">90° Elbow H×H</text>
</svg>
