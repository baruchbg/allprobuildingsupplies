<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="gr1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b8b8b8"/><stop offset="35%" stop-color="#ffffff"/><stop offset="100%" stop-color="#a0a0a0"/>
    </linearGradient>
    <linearGradient id="gr2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c0c0c0"/><stop offset="35%" stop-color="#ffffff"/><stop offset="100%" stop-color="#a8a8a8"/>
    </linearGradient>
  </defs>
  <!-- horizontal run (larger) -->
  <rect x="15" y="80" width="170" height="56" rx="3" fill="url(#gr1)"/>
  <rect x="15" y="88" width="170" height="14" fill="rgba(255,255,255,0.4)"/>
  <!-- vertical branch (smaller = reducing) -->
  <path d="M88,32 L112,32 L112,108 Q100,130 88,108 Z" fill="url(#gr2)"/>
  <rect x="94" y="32" width="10" height="76" fill="rgba(255,255,255,0.35)"/>
  <!-- reducer transition ring -->
  <ellipse cx="100" cy="80" rx="20" ry="5" fill="#b8b8b8"/>
  <!-- left end cap -->
  <ellipse cx="15" cy="108" rx="8" ry="28" fill="#c0c0c0"/>
  <ellipse cx="15" cy="108" rx="5" ry="19" fill="#2a2a2a"/>
  <!-- right end cap -->
  <ellipse cx="185" cy="108" rx="8" ry="28" fill="#c0c0c0"/>
  <ellipse cx="185" cy="108" rx="5" ry="19" fill="#2a2a2a"/>
  <!-- small branch end cap -->
  <ellipse cx="100" cy="32" rx="12" ry="5" fill="#c0c0c0"/>
  <ellipse cx="100" cy="32" rx="8" ry="3" fill="#2a2a2a"/>
  <text x="100" y="172" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#C8981F">REDUCING SAN. TEE</text>
  <text x="100" y="186" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#888">All Hub</text>
</svg>
