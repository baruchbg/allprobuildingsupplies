name = "allpro-api"
main = "src/index.js"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
account_id = "6d5cc2715f71ded196e5bbd1232c01d8"

# Default (production) D1 binding. The worker auto-routes to DB_SANDBOX
# when the incoming request carries X-Sandbox: true and that binding is
# present, so one deployed worker serves both /test/ and production.
[[d1_databases]]
binding = "DB"
database_name = "allpro-db"
database_id = "31689783-6a85-460f-b9ac-7ba9d7be8dc0"

[[d1_databases]]
binding = "DB_SANDBOX"
database_name = "allpro-db-sandbox"
database_id = "cb7c6d87-4ca6-4897-a953-4d81650034b8"

[vars]
# CORS - tightened to just the production and sandbox origins we serve.
# Add additional origins (e.g. staging) here.
ALLOWED_ORIGINS = "https://allprobuildingsupplies.com,https://www.allprobuildingsupplies.com,http://localhost:8080,http://127.0.0.1:5500"

# ADMIN_PIN, ADMIN_KEY, and JWT_SECRET are all set via
# `wrangler secret put` so they never land in git.
# Rotate via: `echo "NewPin" | npx wrangler secret put ADMIN_PIN`
